# LibreChat Configuration - Full Reference

version: 1.2.1
cache: true

# File storage - use 'local', 's3', or 'firebase' per type
fileStrategy: local
fileStrategies:
  default: local
  avatar: local
  image: local
  document: local

# Image output format for generations
imageOutputType: png

# Interface configuration
interface:
  customWelcome: 'Daily Thread'
  fileSearch: true
  endpointsMenu: false
  modelSelect: false
  parameters: false
  sidePanel: true
  presets: true
  multiConvo: false
  bookmarks: true
  memories: true
  temporaryChat: true
  runCode: true
  webSearch: true
  fileCitations: true
  prompts:
    use: true
    create: true
    share: true
    public: false
  agents:
    use: true
    create: true
    share: true
    public: false
  peoplePicker:
    users: true
    groups: true
    roles: true
  # Show expandable tool input/output (JSON). Set false for business-facing UIs.
  toolCallDetails: true
  # Spacing of tool call rows: 'normal' | 'compact'
  toolCallSpacing: compact
  marketplace:
    use: false
  remoteAgents:
    use: false
    create: false
    share: false
    public: false
  temporaryChatRetention: 720
  mcpServers:
    use: true
    create: true
    share: false
    public: false
    trustCheckbox:
      label:
        en: 'I understand and I want to continue'
      subLabel:
        en: |
          Daily Thread hasn't reviewed this MCP server. Attackers may attempt to steal your data or trick the model into taking unintended actions.
  privacyPolicy:
    externalUrl: 'https://dailythread.ai/privacy-policy'
    openNewTab: true
  termsOfService:
    externalUrl: 'https://dailythread.ai/tos'
    openNewTab: true
    modalAcceptance: true
    modalTitle: 'Terms of Service for Daily Thread'
    modalContent: |
      # Terms of Service for Daily Thread
      *Effective Date: March 5, 2025*

      By using this service, you agree to these Terms. You must accept to continue.

      ## 1. Service Description
      Daily Thread is an AI-powered chat platform that may include file uploads, web search, code execution, and integrations with third-party services (e.g., Google Workspace, Microsoft 365). AI responses are generated by third-party models and are not guaranteed to be accurate or complete.

      ## 2. Acceptable Use
      You agree to use the service only for lawful purposes. You will not: (a) violate laws or regulations; (b) harass, abuse, or harm others; (c) transmit malware or attempt unauthorized access; (d) use the service to generate spam or misleading content; or (e) circumvent security or rate limits.

      ## 3. Prohibited Content
      Do not upload or share confidential information, trade secrets, or personal data of others without consent. You are responsible for ensuring you have rights to any content you provide. We are not responsible for content you submit.

      ## 4. AI Outputs Disclaimer
      AI-generated content may be inaccurate, incomplete, or inappropriate. You are solely responsible for verifying and using any output. Do not rely on AI outputs for critical decisions without independent verification.

      ## 5. Third-Party Integrations
      Connecting external services (e.g., email, cloud storage) is at your own risk. You authorize the service to access data you connect. We are not responsible for third-party services or data handling by those services.

      ## 6. Account Termination
      We may suspend or terminate your access for violations of these Terms or for any reason. You may stop using the service at any time.

      ## 7. Limitation of Liability
      THE SERVICE IS PROVIDED "AS IS." WE DISCLAIM ALL WARRANTIES. WE ARE NOT LIABLE FOR INDIRECT, INCIDENTAL, OR CONSEQUENTIAL DAMAGES. OUR LIABILITY IS LIMITED TO THE AMOUNT YOU PAID IN THE 12 MONTHS BEFORE THE CLAIM.

      ## 8. Indemnification
      You agree to indemnify and hold us harmless from claims arising from your use of the service or your violation of these Terms.

      ## 9. Changes
      We may modify these Terms. Continued use after changes constitutes acceptance. Material changes may be communicated via email or in-app notice.

      ## 10. Contact
      Questions: contact@dailythread.ai. Full terms: https://dailythread.ai/tos. Privacy: https://dailythread.ai/privacy-policy.

# Code generation (generate_code tool) - required when using Coder agent
codeGeneration:
  provider: openai
  model: gpt-5-mini

# Registration
registration:
  socialLogins: ['github', 'google', 'discord', 'openid', 'facebook', 'apple', 'saml']
  allowedDomains: []

# Balance and transactions (for usage-based billing)
balance:
  enabled: false
  startBalance: 20000
  autoRefillEnabled: false
  refillIntervalValue: 30
  refillIntervalUnit: days
  refillAmount: 10000

transactions:
  enabled: true

# Cloudflare Turnstile (bot protection)
turnstile:
  siteKey: '${TURNSTILE_SITE_KEY}'
  options:
    language: auto
    size: normal

# Rate limits
rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60

# Speech (TTS/STT)
speech:
  tts:
    openai:
      url: ''
      apiKey: '${TTS_API_KEY}'
      model: ''
      voices: []
  stt:
    openai:
      url: ''
      apiKey: '${STT_API_KEY}'
      model: ''

# Agent Actions domain restrictions (SSRF protection)
actions:
  allowedDomains:
    - 'swapi.dev'
    - 'dailythread.ai'
    - 'google.com'

# MCP Server domain restrictions
mcpSettings:
  allowedDomains:
    - 'localhost'
    - 'host.docker.internal'
    - '*.example.com'
    - 'mcp.stripe.com'
    - '*.plaid.com'
    - '*.monday.com'
    - '*.asana.com'
    - '*.zoho.com'
    - '*.hubspot.com'

# MCP Servers (example - uncomment and configure as needed)
mcpServers:
  Google:
    oauthTimeout: 30000
    initTimeout: 150000
    type: stdio
    command: node
    args:
      - ./mcp-servers/google-workspace/workspace-server/dist/index.js
    startup: false
    # Icon: put file in client/public/assets/ and reference as /assets/filename.ext
    iconPath: /assets/google.svg
    outputFormatter: token-optimized
    oauth:
      authorization_url: https://accounts.google.com/o/oauth2/v2/auth
      token_url: https://oauth2.googleapis.com/token
      client_id: '${GOOGLE_WORKSPACE_CLIENT_ID}'
      client_secret: '${GOOGLE_WORKSPACE_CLIENT_SECRET}'
      scope: "https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/documents https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/chat.spaces https://www.googleapis.com/auth/chat.messages https://www.googleapis.com/auth/chat.memberships https://www.googleapis.com/auth/gmail.modify https://www.googleapis.com/auth/gmail.labels https://www.googleapis.com/auth/directory.readonly https://www.googleapis.com/auth/contacts https://www.googleapis.com/auth/presentations https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/tasks"
      additional_auth_params:
        access_type: offline
        prompt: consent
    env:
      GOOGLE_ACCESS_TOKEN: "{{LIBRECHAT_MCP_OAUTH_ACCESS_TOKEN}}"
      WORKSPACE_CLIENT_ID: '${GOOGLE_WORKSPACE_CLIENT_ID}'
  Microsoft:
    oauthTimeout: 30000
    initTimeout: 150000
    type: stdio
    command: node
    args:
      - ./mcp-servers/ms-365-mcp-server/dist/index.js
      - --preset
      - smb
      - --org-mode
    startup: false
    iconPath: /assets/microsoft.svg
    outputFormatter: token-optimized
    oauth:
      authorization_url: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
      token_url: https://login.microsoftonline.com/common/oauth2/v2.0/token
      client_id: '${MS365_MCP_CLIENT_ID}'
      client_secret: '${MS365_MCP_CLIENT_SECRET}'
      scope: "User.Read Mail.Read Mail.ReadWrite Mail.Send Mail.Read.Shared Mail.Send.Shared Calendars.Read Calendars.ReadWrite Calendars.Read.Shared Files.Read Files.ReadWrite Tasks.Read Tasks.ReadWrite Contacts.Read Contacts.ReadWrite People.Read User.Read.All offline_access"
    env:
      MS365_MCP_OAUTH_TOKEN: "{{LIBRECHAT_MCP_OAUTH_ACCESS_TOKEN}}"
#   filesystem:
#     type: stdio
#     command: npx
#     args:
#       - -y
#       - "@modelcontextprotocol/server-filesystem"
#       - /path/to/allowed/directory
#     timeout: 60000

# Web Search configuration
webSearch:
  serperApiKey: '${SERPER_API_KEY}'
  searxngInstanceUrl: '${SEARXNG_INSTANCE_URL}'
  searxngApiKey: '${SEARXNG_API_KEY}'
  firecrawlApiKey: '${FIRECRAWL_API_KEY}'
  firecrawlApiUrl: '${FIRECRAWL_API_URL}'
  jinaApiKey: '${JINA_API_KEY}'
  jinaApiUrl: '${JINA_API_URL}'
  cohereApiKey: '${COHERE_API_KEY}'
  searchProvider: serper
  scraperProvider: firecrawl
  rerankerType: jina
  safeSearch: 1

# Memory configuration
memory:
  disabled: true
  validKeys: ['preferences', 'work_info', 'personal_info', 'skills', 'interests', 'context']
  tokenLimit: 10000
  charLimit: 10000
  personalize: true
  messageWindowSize: 5
  agent:
    provider: openAI
    model: gpt-5-nano
    instructions: "You are a memory management assistant. Use set_memory ONLY when the user requests memory actions with phrases like: Remember [that] [I]..., Don't forget..., Please remember..., Store this..., Change [my] [the] memory about..., Update [my] [the] memory..., Actually remember that.... For updates, use set_memory with the same key and new value (do not delete first). Use delete_memory only when the user explicitly asks to forget or remove specific information."
# OCR configuration (for document text extraction)
# ocr:
#   strategy: mistral_ocr
#   apiKey: '${OCR_API_KEY}'
#   baseURL: '${OCR_BASEURL}'
#   mistralModel: 'pixtral-12b-2409'

# File upload configuration
fileConfig:
  endpoints:
    assistants:
      fileLimit: 5
      fileSizeLimit: 10
      totalSizeLimit: 50
      supportedMimeTypes:
        - 'image/.*'
        - 'application/pdf'
    openAI:
      fileLimit: 10
      fileSizeLimit: 20
      totalSizeLimit: 100
    default:
      fileLimit: 10
      fileSizeLimit: 20
      totalSizeLimit: 100
  serverFileSizeLimit: 100
  avatarSizeLimit: 2
  imageGeneration:
    percentage: 100
    px: 1024
  clientImageResize:
    enabled: false
    maxWidth: 1900
    maxHeight: 1900
    quality: 0.92

